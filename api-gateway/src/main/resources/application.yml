server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Все заголовки от клиента (в т.ч. X-User-Id) проксируются автоматически.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        # ── Health-check pass-through ──────────────────────────────────────
        # Actuator lives at service-root (/actuator/health), NOT under
        # /api/v1/payments/. These MUST be defined before the general
        # /payments/** and /orders/** routes below: Gateway matches routes
        # in definition order and stops at the first match, so without this
        # ordering the general rule would shadow these and prefix
        # /actuator/health with /api/v1/payments/, producing a 404.
        - id: payments-health
          uri: http://payments-service:8081
          predicates:
            - Path=/payments/actuator/**
          filters:
            - RewritePath=/payments/actuator/(?<remaining>.*), /actuator/${remaining}

        - id: orders-health
          uri: http://orders-service:8082
          predicates:
            - Path=/orders/actuator/**
          filters:
            - RewritePath=/orders/actuator/(?<remaining>.*), /actuator/${remaining}

        # ── General API routes ─────────────────────────────────────────────
        # /payments/** → Payments Service /api/v1/payments/**
        - id: payments-service
          uri: http://payments-service:8081
          predicates:
            - Path=/payments/**
          filters:
            - RewritePath=/payments/(?<remaining>.*), /api/v1/payments/${remaining}

        # /orders/** → Orders Service /api/v1/orders/**
        - id: orders-service
          uri: http://orders-service:8082
          predicates:
            - Path=/orders/**
          filters:
            - RewritePath=/orders/(?<remaining>.*), /api/v1/orders/${remaining}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
