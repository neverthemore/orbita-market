server:
  port: 8080

spring:
  application:
    name: api-gateway
  cloud:
    gateway:
      # Все заголовки от клиента (в т.ч. X-User-Id) проксируются автоматически.
      default-filters:
        - DedupeResponseHeader=Access-Control-Allow-Credentials Access-Control-Allow-Origin
      routes:
        - id: payments-health
          uri: http://payments-service:8081
          predicates:
            - Path=/payments/actuator/**
          filters:
            - RewritePath=/payments/actuator/(?<remaining>.*), /actuator/${remaining}

        - id: orders-health
          uri: http://orders-service:8082
          predicates:
            - Path=/orders/actuator/**
          filters:
            - RewritePath=/orders/actuator/(?<remaining>.*), /actuator/${remaining}

        - id: payments-service
          uri: http://payments-service:8081
          predicates:
            - Path=/payments/**
          filters:
            - RewritePath=/payments/(?<remaining>.*), /api/v1/payments/${remaining}

        - id: orders-service
          uri: http://orders-service:8082
          predicates:
            - Path=/orders/**
          filters:
            - RewritePath=/orders/(?<remaining>.*), /api/v1/orders/${remaining}

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    org.springframework.cloud.gateway: DEBUG
