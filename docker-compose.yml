version: "3.9"

# ── OrbitaMarket — docker compose up --build ──────────────────────────────────
#
# Services:
#   postgres     — single PG instance, databases: payments_db, orders_db
#   kafka        — official Apache Kafka 3.7.0 image, KRaft combined mode (no Zookeeper)
#   payments     — Payments Service :8081
#   orders       — Orders Service   :8082
#   gateway      — API Gateway      :8080  ← single entry point
#
# Quick start:
#   mvn clean package -DskipTests
#   docker compose up --build
#   # wait ~40s for all health checks to pass
#   curl -X POST http://localhost:8080/payments/accounts -H "X-User-Id: user-42"
#
# NOTE on the Kafka image: we use the OFFICIAL apache/kafka image (published by
# the Apache Kafka project itself since 3.7.0), NOT bitnami/kafka. Bitnami
# discontinued free Docker Hub distribution of its catalog in 2025 — using it
# would make `docker compose up` fail to pull on a clean machine.

services:

  # ── PostgreSQL ────────────────────────────────────────────────────────────
  postgres:
    image: postgres:16-alpine
    container_name: orbita-postgres
    environment:
      POSTGRES_USER: orbita
      POSTGRES_PASSWORD: orbita
      POSTGRES_DB: orbita
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/init-db.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U orbita"]
      interval: 5s
      timeout: 5s
      retries: 10

  # ── Kafka — official apache/kafka image, KRaft combined mode ────────────────
  # Single broker acts as both broker + controller — sufficient for dev/MVP.
  # CLUSTER_ID is the well-known Confluent/Apache quickstart demo value;
  # any valid base64 16-byte string works for a fresh single-node cluster.
  kafka:
    image: apache/kafka:3.7.0
    container_name: orbita-kafka
    hostname: kafka
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@kafka:9093
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_NUM_PARTITIONS: 3
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      CLUSTER_ID: MkU3OEVBNTcwNTJENDM2Qk
    volumes:
      - kafka_data:/var/lib/kafka/data
    healthcheck:
      test: ["CMD-SHELL", "/opt/kafka/bin/kafka-broker-api-versions.sh --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 30s

  # ── Payments Service ──────────────────────────────────────────────────────
  payments-service:
    build:
      context: ./payments-service
      dockerfile: Dockerfile
    container_name: orbita-payments
    ports:
      - "8081:8081"
    environment:
      DB_HOST: postgres
      DB_USER: orbita
      DB_PASS: orbita
      KAFKA_BOOTSTRAP: kafka:9092
      SPRING_PROFILES_ACTIVE: default
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8081/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── Orders Service ────────────────────────────────────────────────────────
  orders-service:
    build:
      context: ./orders-service
      dockerfile: Dockerfile
    container_name: orbita-orders
    ports:
      - "8082:8082"
    environment:
      DB_HOST: postgres
      DB_USER: orbita
      DB_PASS: orbita
      KAFKA_BOOTSTRAP: kafka:9092
      SPRING_PROFILES_ACTIVE: default
    depends_on:
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    restart: on-failure
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8082/actuator/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 40s

  # ── API Gateway ───────────────────────────────────────────────────────────
  gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: orbita-gateway
    ports:
      - "8080:8080"
    depends_on:
      payments-service:
        condition: service_healthy
      orders-service:
        condition: service_healthy
    restart: on-failure

volumes:
  postgres_data:
  kafka_data:
