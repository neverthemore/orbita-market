server:
  port: 8082

spring:
  jackson:
    serialization:
      write-dates-as-timestamps: false
    deserialization:
      fail-on-unknown-properties: false
  application:
    name: orders-service

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:5432/orders_db
    username: ${DB_USER:orbita}
    password: ${DB_PASS:orbita}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: validate
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

  flyway:
    enabled: true
    locations: classpath:db/migration

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP:localhost:9092}
    consumer:
      group-id: orders-consumer-group

management:
  endpoints:
    web:
      exposure:
        include: health,info

orbita:
  kafka:
    topics:
      payment-requested: order-payment-requested
      payment-completed: order-payment-completed
      payment-failed: order-payment-failed
  outbox:
    poll-interval-ms: 1000
